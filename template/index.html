<!doctype html>
<html lang="en" data-bs-theme="dark">
   <head>
     <!-- Required meta tags -->
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

     <!-- Bootstrap CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

     <!--Styles.css-->
     {% load static %}
     <link rel="stylesheet" href="{% static 'style.css' %}" />
     

<title>Textify</title>
   </head>
     <body>
       <nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      {% load static %}
      <img src="{% static "Logo.png" %}" alt="Logo" /width="25" heigh<t="25" class="d-inline-block align-text-top"><strong id="nav_txt"> Textify</strong>
    </a>
  </div>
</nav>   


 <div class="alert alert-info alert-dismissible fade show mt-3" role="alert">
  <strong>Welcome To Textify!</strong> Enter Your Text To See Magic!
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">*</button>
 </div>

{% block content %}

 <div class="container">

   <form action='analyze/' method='post'>
{% csrf_token %}

  <div class="form-floating mt-3">
    <textarea name="text" class="form-control" placeholder="Your Text Here!" id="floatingTextarea" style="height: 100px">  </textarea>
  <label for="floatingTextarea">Your Text Here!  
  </label>
  </div>



<div class="form-check form-switch">
  <input name="removepunc" class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault1">
  <label class="form-check-label" for="flexSwitchCheckDefault1">Punctuations Removed</label>
</div>
     
<div class="form-check form-switch">
  <input name ="upper" class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckChecked2" >
  <label class="form-check-label" for="flexSwitchCheckChecked2">Uppercase</label>
</div>
     
<div class="form-check form-switch">
  <input name="xsRemover" class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDisabled3">
  <label class="form-check-label" for="flexSwitchCheckDisabled3">Xtra Space Remover</label>
</div>
     
<div class="form-check form-switch">
  <input name="nlRemove" class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckCheckedDisabled4" unchecked disabled>
  <label class="form-check-label" for="flexSwitchCheckCheckedDisabled4">New-Line Remover</label>
</div>
     

     <button type="submit" class="btn btn-outline-info">Analyze-Text</button>
     </form>
 </div>
{% endblock %}
     <!-- Optional JavaScript -->
     <!-- jQuery first, then Popper.js, then Bootstrap JS -->
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
   </body>
 </html>
